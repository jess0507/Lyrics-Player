name: Release to Play Store

# 當 master 有新 push 時，先建置已簽章 AAB 並上傳為可下載 artifact，
# 再由獨立的 deploy job 上架 Play Store。
# 拆兩段的好處：build 一定能產出可下載的 AAB；deploy 失敗時可單獨 re-run，不必重 build。
# 版號取最新 tag 的 major.minor，最後一位放「自最新 tag 起算的 commit 數」。
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需完整歷史以取得 tag 並計算 commit 數

      # 版號規則：versionName = <tag major.minor>.<自最新 tag 起算的 commit 數>；
      # versionCode 用總 commit 數（單調遞增，換 tag 後不會倒退，符合 Play Store 要求）。
      - name: Compute version
        id: version
        run: |
          RAW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$RAW_TAG" ]; then
            TAG=${RAW_TAG#v}
            MAJOR_MINOR=$(echo "$TAG" | cut -d. -f1-2)
            COUNT=$(git rev-list "$RAW_TAG"..HEAD --count)
          else
            MAJOR_MINOR="0.0"
            COUNT=$(git rev-list HEAD --count)
          fi
          VERSION_NAME="${MAJOR_MINOR}.${COUNT}"
          BUILD_NUMBER=$(git rev-list HEAD --count)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "版本: $VERSION_NAME (build $BUILD_NUMBER)，最新 tag: ${RAW_TAG:-無}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # 由 secret 還原 keystore 與 key.properties（android/app/build.gradle.kts 會讀取）。
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      # 提早驗證 keystore 可正常讀取，避免拖到簽章階段才爆難懂的 ASN.1 錯誤。
      - name: Verify keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: keytool -list -keystore android/app/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.build }}

      - name: Cleanup secrets
        if: always()
        run: rm -f android/key.properties android/app/upload-keystore.jks

      # 上傳為 artifact，run 頁面即可下載；也供 deploy job 取用。
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy to Play Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: release

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.js.seek_player
          releaseFiles: release/app-release.aab
          track: internal
          status: completed
