name: Release to Play Store

# 打 v* tag 時觸發：以 shorebird release 建置已簽章 AAB(向 Shorebird 註冊
# baseline,之後才能對此版本下 OTA patch),上傳為 artifact 後由獨立 deploy job
# 上架 Play Store。master 的日常 push 改走 patch.yml 以 OTA 出貨,不經商店。
# 拆兩段的好處：build 一定能產出可下載的 AAB；deploy 失敗時可單獨 re-run，不必重 build。
#
# 版號規則（錨定在最新 tag 的 commit,tag 之間不變,patch 才有固定目標）：
#   versionName = tag 本身去掉 v 前綴（例 v1.2.0 → 1.2.0）
#   versionCode = 到 tag 為止的總 commit 數（單調遞增,符合 Play Store 要求）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Shorebird release (AAB)
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.version.outputs.name }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需完整歷史以取得 tag 並計算 commit 數

      # release 只能出自 master 上的 commit,避免誤把分支版本上架。
      - name: Ensure tag commit is on master
        run: git merge-base --is-ancestor HEAD origin/master

      # 錨定在最新 tag 計算（tag push 時 HEAD 即 tag commit;
      # workflow_dispatch 重跑時也會回到同一個 tag 得到同一組版號）。
      - name: Compute version
        id: version
        run: |
          RAW_TAG=$(git describe --tags --abbrev=0)
          VERSION_NAME=${RAW_TAG#v}
          BUILD_NUMBER=$(git rev-list "$RAW_TAG" --count)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "版本: $VERSION_NAME (build $BUILD_NUMBER)，tag: $RAW_TAG"
          {
            echo "## 📦 Shorebird release"
            echo ""
            echo "| 項目 | 值 |"
            echo "| --- | --- |"
            echo "| versionName | \`$VERSION_NAME\` |"
            echo "| versionCode | \`$BUILD_NUMBER\` |"
            echo "| tag | \`$RAW_TAG\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # analyze / test 用一般 Flutter;實際建置由 Shorebird 以其 Flutter fork 執行。
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # 由 secret 還原 keystore 與 key.properties（android/app/build.gradle.kts 會讀取）。
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      # 提早驗證 keystore 可正常讀取，避免拖到簽章階段才爆難懂的 ASN.1 錯誤。
      - name: Verify keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: keytool -list -keystore android/app/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      # 建置並向 Shorebird 註冊 release(baseline);AAB 照常產在 flutter build 的輸出路徑。
      # --artifact apk 會額外產出 APK,供直接下載側載測試。
      - name: Shorebird release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --artifact apk -- --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.build }}

      - name: Cleanup secrets
        if: always()
        run: rm -f android/key.properties android/app/upload-keystore.jks

      # 上傳為 artifact，run 頁面即可下載；也供 deploy job 取用。
      - name: Upload AAB artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.version.outputs.name }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifact
        id: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ steps.version.outputs.name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Write summary
        run: |
          {
            echo "## 🚀 Deploy to Play Store"
            echo ""
            echo "| 項目 | 值 |"
            echo "| --- | --- |"
            echo "| versionName | \`${{ steps.version.outputs.name }}\` |"
            echo "| versionCode | \`${{ steps.version.outputs.build }}\` |"
            echo "| track | \`internal\` |"
            echo "| AAB download URL | ${{ steps.upload.outputs.artifact-url }} |"
            echo "| APK download URL | ${{ steps.upload-apk.outputs.artifact-url }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Play Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab-${{ needs.build.outputs.name }}
          path: release

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.js.seek_player
          releaseFiles: release/app-release.aab
          track: internal
          status: completed
