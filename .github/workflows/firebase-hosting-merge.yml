name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
    # 只有 hosting 內容（public/ 等）變更時才部署；推 app 程式不觸發。
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-merge.yml"
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # public/ 為靜態檔，無需 npm build。
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEEK_PLAYER_F724E }}
          channelId: live
          projectId: seek-player-f724e
