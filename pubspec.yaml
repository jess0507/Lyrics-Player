name: seek_player
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # 狀態管理 / 路由
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # 音訊播放 + 背景播放 / 通知列
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  rxdart: ^0.28.0

  # 權限
  permission_handler: ^11.3.1

  # 檔案匯入
  file_picker: ^8.1.6

  # 本地儲存
  shared_preferences: ^2.3.3

  # 開啟外部連結（隱私權政策等）
  url_launcher: ^6.3.1

  # 本地資料庫（媒體檔案資料）。
  # 註：isar_flutter_libs 3.1.0+1 未宣告 AGP namespace，
  # 由 android/build.gradle.kts 的 subprojects 區塊補上以相容新版 AGP。
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # 帳戶（Firebase）
  firebase_core: ^4.10.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Isar 程式碼產生
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

  # App 圖示產生（Android / iOS 各尺寸）
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true

# App 圖示設定：來源圖 assets/icon/app_logo.png
# 產生指令：dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Android 8.0+ 自適應圖示
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_logo.png"
