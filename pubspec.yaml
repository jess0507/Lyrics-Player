name: seek_player
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # 狀態管理 / 路由
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # 音訊播放 + 背景播放 / 通知列
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  rxdart: ^0.28.0

  # 權限
  permission_handler: ^11.3.1

  # 裝置音樂庫掃描（MediaStore）
  on_audio_query: ^2.9.0

  # 本地儲存
  shared_preferences: ^2.3.3

  # 本地資料庫（統計等資料儲存層）。
  # 使用 isar-community 分支：原版 isar 3.1.0+1 的 libisar.so 僅 4 KB 對齊，
  # 不支援 Android 16 KB 記憶體分頁裝置（Play Console 會擋）；
  # 3.3.2 的 .so 已為 16 KB(0x4000)對齊，且解除舊 dart_style/analyzer 鎖定。
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2

  # 開啟外部連結（隱私權政策等）
  url_launcher: ^6.3.1

  # 統計頁折線圖
  fl_chart: ^0.69.2

  path_provider: ^2.1.4

  # 帳戶（Firebase）
  firebase_core: ^4.10.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.2
  cloud_functions: ^6.3.2
  cloud_firestore: ^6.1.0
  marquee: ^2.3.0
  flutter_svg: ^2.0.10+1
  file_picker: ^11.0.2
  firebase_storage: ^13.4.2
  ffmpeg_kit_flutter_new: ^4.3.2
  palette_generator: ^0.3.3+7
  firebase_app_check: ^0.4.5
  firebase_crashlytics: ^5.2.4
  shorebird_code_push: ^2.0.7
  restart_app: ^1.8.3

  # Google Play 商店版本檢查（官方 In-App Update API,僅用來偵測新版本）
  in_app_update: ^4.2.3
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13

  # Asset type-safe 引用產生(Assets.xxx)
  # （isar_community 已解除舊 dart_style 鎖定，不再需要 pin flutter_gen_core 5.8.0）
  flutter_gen_runner: ^5.14.1

  # Isar 程式碼產生
  isar_community_generator: ^3.3.2

  # App 圖示產生（Android / iOS 各尺寸）
  flutter_launcher_icons: ^0.14.1

  # 啟動畫面（splash screen）產生
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - shorebird.yaml

# Asset type-safe 引用產生設定(flutter_gen)
# 產生指令：dart run build_runner build
flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true

# App 圖示設定
# 產生指令：dart run flutter_launcher_icons
# image_path 使用「不透明白底方形」來源圖(app_logo_icon.png)：
#   圓角交給 iOS / Android launcher 遮罩處理(標準做法);若把圓角烤進圖裡,
#   iOS 的 remove_alpha_ios 會把透明角填回白色方角。白底方形也確保
#   舊版 Android(<8.0) legacy icon 有白色背景而非透明浮空 logo。
flutter_launcher_icons:
  image_path: "assets/icon/app_logo_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Android 8.0+ 自適應圖示:背景白色圖層 + 透明 logo 前景
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_logo.png"

# App 啟動畫面設定：白底 + logo 置中
# 產生指令：dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/app_logo.png"
  # Android 12+ 啟動畫面 API（圖示會被圓形遮罩，使用留白較多的版本）
  android_12:
    color: "#FFFFFF"
    image: "assets/icon/app_logo_android12.png"
  android: true
  ios: true
