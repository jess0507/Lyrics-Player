name: seek_player
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # 狀態管理 / 路由
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # 音訊播放 + 背景播放 / 通知列
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.15
  rxdart: ^0.28.0

  # 權限
  permission_handler: ^11.3.1

  # 裝置音樂庫掃描（MediaStore）
  on_audio_query: ^2.9.0

  # 本地儲存
  shared_preferences: ^2.3.3

  # 本地資料庫（統計等資料儲存層）。
  # 註：isar_flutter_libs 3.1.0+1 未宣告 AGP namespace，
  # 由 android/build.gradle.kts 的 subprojects 區塊補上以相容新版 AGP。
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 開啟外部連結（隱私權政策等）
  url_launcher: ^6.3.1

  # 統計頁折線圖
  fl_chart: ^0.69.2

  path_provider: ^2.1.4

  # 帳戶（Firebase）
  firebase_core: ^4.10.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.2
  cloud_functions: ^6.3.2
  cloud_firestore: ^6.1.0
  marquee: ^2.3.0
  file_picker: ^11.0.2
  firebase_storage: ^13.4.2
  ffmpeg_kit_flutter_new: ^4.2.1
  palette_generator: ^0.3.3+7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13

  # Isar 程式碼產生
  isar_generator: ^3.1.0+1

  # App 圖示產生（Android / iOS 各尺寸）
  flutter_launcher_icons: ^0.14.1

  # 啟動畫面（splash screen）產生
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/app_logo.png
    - assets/icon/app_logo_android12.png

# App 圖示設定：來源圖 assets/icon/app_logo.png
# 產生指令：dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Android 8.0+ 自適應圖示
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_logo.png"

# App 啟動畫面設定：白底 + logo 置中
# 產生指令：dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/app_logo.png"
  # Android 12+ 啟動畫面 API（圖示會被圓形遮罩，使用留白較多的版本）
  android_12:
    color: "#FFFFFF"
    image: "assets/icon/app_logo_android12.png"
  android: true
  ios: true
